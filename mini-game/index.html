<style>

html, body {
  max-width: 100%;
  overflow-x: hidden;
}

.content {
  width: 100% !important;
  max-width: 100% !important;
  margin: 0 auto !important;
  margin-left: 0 !important;
  padding: 20px !important;
  display: flex !important;
  justify-content: center !important;
}

.game-card {
  width: 100%;
  max-width: 700px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* =========================
   GAME AREA
========================= */

#gameArea {
  width: min(94vw, 620px);
  height: 340px;
  margin: 20px auto;
  position: relative;
  background: linear-gradient(to bottom, #fffdf5, #f7f1dd);
  border: 3px solid goldenrod;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  overflow: hidden;
}

@media(max-width:768px){
  #gameArea{
    width: 92vw;
    height: 300px;
  }
}

.emoji {
  position: absolute;
  font-size: 42px;
  cursor: pointer;
  user-select: none;
  transition: top 0.25s ease, left 0.25s ease, transform 0.15s ease;
  filter: drop-shadow(0 3px 3px rgba(0,0,0,0.2));
  touch-action: manipulation;
}

.emoji:active {
  transform: scale(1.3);
}

#startBtn, #zenBtn {
  background: goldenrod;
  border: none;
  padding: 10px 16px;
  font-size: 15px;
  font-family: 'Almendra', serif;
  cursor: pointer;
  border-radius: 10px;
  margin: 5px;
  transition: 0.2s ease;
}

#startBtn:hover, #zenBtn:hover {
  background: #c99b2c;
  transform: scale(1.05);
}

#message {
  margin-top: 15px;
  font-size: 20px;
  font-weight: bold;
  color: rgb(158,120,28);
  min-height: 30px;
}

.pop {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

@media(max-width:768px){
  .content {
    padding: 10px !important;
  }

  .game-card {
    width: 100%;
  }
}

.hamburger {
  display: none;
  font-size: 28px;
  background: goldenrod;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  position: absolute;
  right: 20px;
  top: 20px;
  z-index: 9999;
}

/* MOBILE NAV */
@media(max-width: 768px) {
  .primary ul {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 100%;
    right: 0;
    background: yellow;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    gap: 10px;
  }

  .primary ul.show {
    display: flex;
  }

  .hamburger {
    display: block;
  }
}


</style>

  <a href="../index.html" class="logo-link">
    <img src="../images/Final_PuyPuy_Emblem_Shield_Only.png" alt="Logo of Auriel" class="Profile">
  </a>

  <button type="button" class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
    ☰
  </button>

  <nav class="primary">
    <ul id="navList">
      <li><a href="../index.html">Profile</a></li>
      <li><a href="../resume/index.html">Resume</a></li>

      <li><a href="../contact/index.html">Contact</a></li>
      <li><a href="../work-examples/index.html">Projects</a></li>
      <li><a href="../personal-photos/index.html">Travel Photos</a></li>
      <li><a href="index.html" class="active">Pet The Cat</a></li>
    </ul>
  </nav>

</header>

<main class="content">

<section class="game-card">

<h1 id="main-heading">Pet The Cat</h1>

<p class="indented-paragraph">
Tap to pet Kelly The Cat 🐱 and avoid disturbing Puypuy The Hampter 🐹.
</p>

<h2>Cats Helped: <span id="score">0</span></h2>
<h2>Time: <span id="time">20</span></h2>

<div id="gameArea">
  <div id="cat" class="emoji">🐱</div>
  <div id="hamster" class="emoji">🐹</div>
</div>

<button type="button" id="startBtn">Start Game</button>
<button type="button" id="zenBtn">Zen Mode</button>

<h2 id="message"></h2>

</section>

</main>

<script>

/* =========================
   AUDIO (NO FILES)
========================= */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.body.addEventListener("click", () => {
  if (audioCtx.state === "suspended") audioCtx.resume();
}, { once: true });

function playKellySound() {
  const now = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(600, now);
  osc.frequency.exponentialRampToValueAtTime(280, now + 0.25);

  gain.gain.setValueAtTime(0.09, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + 0.3);
}

function playPuypuySound() {
  const now = audioCtx.currentTime;

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc1.type = "square";
  osc2.type = "triangle";

  osc1.frequency.setValueAtTime(900, now);
  osc2.frequency.setValueAtTime(1200, now);

  gain.gain.setValueAtTime(0.07, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);

  osc1.start(now);
  osc2.start(now);

  osc1.stop(now + 0.18);
  osc2.stop(now + 0.18);
}

/* =========================
   GAME STATE
========================= */

const gameArea = document.getElementById("gameArea");
const cat = document.getElementById("cat");
const hamster = document.getElementById("hamster");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const message = document.getElementById("message");

const startBtn = document.getElementById("startBtn");
const zenBtn = document.getElementById("zenBtn");

let score = parseInt(localStorage.getItem("kellyHelped")) || 0;
let time = 20;
let timer = null;
let running = false;
let zenMode = false;

scoreEl.textContent = score;

/* =========================
   FIXED MOVE (NO OUT OF BOUNDS)
========================= */

function move(el) {
  const rect = gameArea.getBoundingClientRect();

  const size = el.offsetWidth || 50;

  const maxX = rect.width - size;
  const maxY = rect.height - size;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  el.style.left = x + "px";
  el.style.top = y + "px";
}

/* =========================
   POP
========================= */

function pop(el) {
  el.classList.remove("pop");
  void el.offsetWidth;
  el.classList.add("pop");
}

/* =========================
   GAME START
========================= */

function startGame() {
  time = 20;
  running = true;

  timeEl.textContent = time;
  message.textContent = "";

  move(cat);
  if (!zenMode) move(hamster);

  clearInterval(timer);

  timer = setInterval(() => {
    if (!running) return;

    time--;
    timeEl.textContent = time;

    move(cat);
    if (!zenMode) move(hamster);

    if (time <= 0) {
      running = false;
      clearInterval(timer);
      message.textContent = "Session ended. Kelly is resting.";
    }
  }, 1000);
}

/* =========================
   ZEN MODE
========================= */

zenBtn.onclick = () => {
  zenMode = !zenMode;
  message.textContent = zenMode ? "Zen Mode enabled" : "Zen Mode disabled";
};

/* =========================
   INTERACTIONS
========================= */

function bind(el, fn) {
  el.addEventListener("pointerdown", fn);
}

bind(cat, () => {
  if (!running) return;

  score++;
  localStorage.setItem("kellyHelped", score);
  scoreEl.textContent = score;

  move(cat);
  pop(cat);
  playKellySound();

  const kellyMsgs = [
  "Kelly blinks slowly",
  "soft purr detected",
  "Kelly approves",
  "gentle meow",
  "Kelly stays still for a moment",
  "warm presence noticed",
  "Kelly looks content",
  "tiny purr vibration",
  "Kelly acknowledges interaction",
  "calm feline response"
];

message.textContent = kellyMsgs[Math.floor(Math.random() * kellyMsgs.length)];
});

bind(hamster, () => {
  if (!running || zenMode) return;

  score = Math.max(0, score - 1);
  localStorage.setItem("kellyHelped", score);
  scoreEl.textContent = score;

  move(hamster);
  pop(hamster);
  playPuypuySound();

  const puypuyMsgs = [
  "Puypuy scurries away",
  "tiny squeak detected",
  "Puypuy is confused",
  "fast hamster movement",
  "Puypuy pauses briefly",
  "rapid wheel energy",
  "Puypuy repositions quickly",
  "small chaos detected",
  "Puypuy retreats slightly",
  "unexpected squeak"
];

message.textContent = puypuyMsgs[Math.floor(Math.random() * puypuyMsgs.length)];
});

startBtn.onclick = startGame;

const hamburger = document.getElementById("hamburger");
const navList = document.querySelector(".primary ul");

hamburger.addEventListener("click", () => {
  const isOpen = navList.classList.toggle("show");
  hamburger.setAttribute("aria-expanded", isOpen);
});

</script>

  <h6>&copy; 2026 Auriel Del Carmen</h6>

</footer>
