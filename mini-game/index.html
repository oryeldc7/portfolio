/* =========================
   GAME AREA (RESPONSIVE)
========================= */

  width: min(92vw, 500px);
  height: min(60vh, 420px);
  margin: 30px auto;
  position: relative;
  background: rgba(255,255,255,0.7);
  border: 3px solid goldenrod;

/* game objects */

  cursor: pointer;
  user-select: none;

  touch-action: manipulation;
}

/* button */

  border: none;
  padding: 12px 18px;
  font-size: 16px;
  font-family: 'Almendra', serif;
  cursor: pointer;
  border-radius: 8px;
  transition: transform 0.2s ease, background 0.2s ease;
}

#startBtn:hover {
  background: #c99b2c;
  transform: scale(1.05);
}

/* message */

  margin-top: 15px;
  font-size: 20px;
  font-weight: bold;
  color: rgb(158,120,28);
}

@media (min-width: 769px) {

  .content {
    margin-left: auto !important;

    max-width: 100% !important;
    width: 100%;
    display: flex;

  section {

<!-- =========================
   MAIN CONTENT
========================= -->

<main class="content">

<section style="text-align:center;">

  <h1 id="main-heading">Catch the Yellow Cat</h1>

  <p class="indented-paragraph">
    Catch the Cat 🐱, Avoid the Hamster 🐹
  </p>

  <h2>Score: <span id="score">0</span></h2>
  <h2>Time: <span id="time">15</span></h2>

  <div id="gameArea">
    <div id="cat" class="emoji">🐱</div>
    <div id="hamster" class="emoji">🐹</div>
  </div>

  <button id="startBtn">Start Game</button>

  <h2 id="message"></h2>

</section>

</main>

<!-- =========================
   GAME JS
========================= -->

<script>

const gameArea = document.getElementById("gameArea");
const cat = document.getElementById("cat");
const hamster = document.getElementById("hamster");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");

let score = 0;
let time = 15;
let timer = null;
let running = false;

function move(el) {
  const rect = gameArea.getBoundingClientRect();
  const size = 40;

  const x = Math.random() * (rect.width - size);
  const y = Math.random() * (rect.height - size);

  el.style.left = x + "px";
  el.style.top = y + "px";
}

function startGame() {
  score = 0;
  time = 15;
  running = true;

  scoreEl.textContent = score;
  timeEl.textContent = time;
  message.textContent = "";

  move(cat);
  move(hamster);

  if (timer) clearInterval(timer);

  timer = setInterval(() => {
    if (!running) return;

    time--;
    timeEl.textContent = time;

    move(cat);
    move(hamster);

    if (time <= 0) {
      running = false;
      clearInterval(timer);

      message.textContent =
        score >= 10 ? "You win 🐱" : "Game Over 🐹";
    }
  }, 1000);
}

/* desktop + mobile tap support */
function bind(el, action) {
  el.addEventListener("click", action);
  el.addEventListener("touchstart", action);
}

bind(cat, () => {
  if (!running) return;
  score++;
  scoreEl.textContent = score;
  move(cat);
});

bind(hamster, () => {
  if (!running) return;
  score--;
  scoreEl.textContent = score;
  move(hamster);
});

startBtn.onclick = startGame;

</script>
